name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - run: gitleaks git --redact --no-banner
