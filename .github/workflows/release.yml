name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      commit: ${{ steps.release.outputs.commit }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Allocate release version
        id: release
        env:
          RELEASE_COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: |
          existing_tag="$(git tag --points-at "$RELEASE_COMMIT" --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
          if [ -n "$existing_tag" ]; then
            tag="$existing_tag"
          else
            latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
            if [ -z "$latest_tag" ]; then
              tag="v0.1.0"
            else
              version="${latest_tag#v}"
              IFS=. read -r major minor patch <<< "$version"
              tag="v${major}.${minor}.$((patch + 1))"
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag --annotate "$tag" "$RELEASE_COMMIT" --message "Release $tag"
            git push origin "refs/tags/$tag"
          fi

          echo "commit=$RELEASE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: Build archive
        env:
          RELEASE_COMMIT: ${{ needs.prepare.outputs.commit }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          archive="boringctl_${RELEASE_VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${archive}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/boring-labs/boringctl/internal/version.Version=${RELEASE_VERSION} -X github.com/boring-labs/boringctl/internal/version.Commit=${RELEASE_COMMIT} -X github.com/boring-labs/boringctl/internal/version.BuildDate=${build_date}" \
            -o "dist/${archive}/boringctl" ./cmd/boringctl
          cp LICENSE README.md "dist/${archive}/"
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: boringctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish checksummed release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.prepare.outputs.commit }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" *.tar.gz checksums.txt --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" *.tar.gz checksums.txt \
              --repo "$GITHUB_REPOSITORY" \
              --target "$RELEASE_COMMIT" \
              --generate-notes \
              --verify-tag
          fi
