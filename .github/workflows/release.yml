name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#v}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          archive="boringctl_${version}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${archive}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/boring-labs/boringctl/internal/version.Version=${version} -X github.com/boring-labs/boringctl/internal/version.Commit=${GITHUB_SHA} -X github.com/boring-labs/boringctl/internal/version.BuildDate=${build_date}" \
            -o "dist/${archive}/boringctl" ./cmd/boringctl
          cp LICENSE README.md "dist/${archive}/"
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"
      - uses: actions/upload-artifact@v4
        with:
          name: boringctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish checksummed release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          gh release create "$GITHUB_REF_NAME" *.tar.gz checksums.txt --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
